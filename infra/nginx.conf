worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;
    access_log /dev/stdout;
    error_log /dev/stderr notice;
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;

    map $http_x_forwarded_proto $forwarded_proto {
        default $scheme;
        https https;
    }

    server {
        listen 8080;
        server_name _;
        client_max_body_size 256k;

        location = /webhook/oddroom-orderops-v1 {
            set $n8n_upstream http://n8n:5678;
            proxy_pass $n8n_upstream;
            proxy_http_version 1.1;
            proxy_request_buffering on;
            proxy_buffering off;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-OddRoom-Private-Admin "";
        }

        location ~ ^/(wp-admin(?:/|$)|wp-login\.php$|xmlrpc\.php$) {
            return 404;
        }

        location / {
            set $wordpress_upstream http://wordpress:80;
            proxy_pass $wordpress_upstream;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-OddRoom-Private-Admin "";
        }
    }
}
